name: Build monograph

on:
  push:
  pull_request:

jobs:
  build-monograph:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX and audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            ripgrep \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-xetex

      - name: Build manuscript
        run: tools/build_monograph.sh

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: qft-monograph-pdf
          path: monograph/tex/main.pdf
